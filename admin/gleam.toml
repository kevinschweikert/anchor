name = "admin"
version = "1.0.0"
target = "javascript"

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
lustre = ">= 5.7.0 and < 6.0.0"
rsvp = ">= 2.0.0 and < 3.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
modem = ">= 2.1.0 and < 3.0.0"
shared = { path = "../shared" }

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 2.3.6 and < 3.0.0"

[tools.lustre.html]
title = "Anchorage Admin"

[tools.lustre.build]
outdir = "../server/priv/static"
no_html = true

[tools.lustre.dev]
port = 1235
proxy = { from = "/api", to = "http://localhost:8000/api" }
